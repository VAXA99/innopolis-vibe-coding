services:
  - type: web
    name: huawei-sync-server
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: "npm install --omit=dev"
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: MOCK_MODE
        value: "true"
      - key: API_TOKEN
        generateValue: true
